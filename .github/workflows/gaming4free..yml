name: Game4Free-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: "*/53 * * * *"   # 🕕 每小时运行一次

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      GOST_PROXY: ${{ secrets.GOST_PROXY }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Gaming4Free-Auto-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Start the GOST proxy forwarding
        if: ${{ env.GOST_PROXY != '' }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          
          echo "🚀 正在使用配置的 GOST_PROXY 启动代理..."
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 4
          
          echo "✅ 准备测试连通性..."
          PROXY_IP=$(curl --max-time 10 -x http://127.0.0.1:8080 https://api.ipify.org 2>/dev/null)
          
          if [ -z "$PROXY_IP" ]; then
            echo "❌ 糟糕！代理连接失败！"
            cat gost.log
            exit 1
          else
            echo "🎉 代理连接成功！"
            MASKED_IP=$(echo "$PROXY_IP" | awk -F. '{print $1".*.*.*"}')
            echo "🌐 当前代理出口 IP: $MASKED_IP"
          fi

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full \
            pulseaudio alsa-utils ffmpeg google-chrome-stable
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage SpeechRecognition pydub requests xvfbwrapper

      - name: Run script
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: ${{ env.GOST_PROXY != '' && '127.0.0.1:8080' || '' }}
        run: |
          mkdir -p scripts/screenshots
          python scripts/renew.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
          retention-days: 1

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0 
          keep_minimum_runs: 2
